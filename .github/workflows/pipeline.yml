this my yml fil name: Tourism Project Pipeline



on:

  push:

    branches:

      - main



jobs:



  register-dataset:

    runs-on: ubuntu-latest



    steps:

      - uses: actions/checkout@v4



      - name: Check Repository Structure

        run: ls -R



      - name: Install Dependencies

        run: pip install -r TourismProject/requirements.txt



      - name: Upload Dataset to Hugging Face Hub

        env:

          HF_TOKEN: ${{ secrets.HF_TOKEN }}

        run: python TourismProject/model_building/data_register.py



  data-prep:

    needs: register-dataset

    runs-on: ubuntu-latest



    steps:

      - uses: actions/checkout@v4



      - name: Install Dependencies

        run: pip install -r TourismProject/requirements.txt



      - name: Run Data Preparation

        env:

          HF_TOKEN: ${{ secrets.HF_TOKEN }}

        run: python TourismProject/model_building/prep.py



  model-training:

    needs: data-prep

    runs-on: ubuntu-latest



    steps:

      - uses: actions/checkout@v4



      - name: Install Dependencies

        run: pip install -r TourismProject/requirements.txt



      - name: Model Training

        env:

          HF_TOKEN: ${{ secrets.HF_TOKEN }}

        run: python TourismProject/model_building/train.py



  deploy-hosting:

    needs: model-training

    runs-on: ubuntu-latest



    steps:

      - uses: actions/checkout@v4



      - name: Install Dependencies

        run: pip install -r TourismProject/requirements.txt



      - name: Deploy to Hugging Face Space

        env:

          HF_TOKEN: ${{ secrets.HF_TOKEN }}

        run: python TourismProject/hosting/hosting.py 
